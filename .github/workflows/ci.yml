name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analytics-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analytics-service/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run analytics tests
        run: python -m pytest -q tests

  simulator-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simulator
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: simulator/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==8.4.1
          python -m pip install -r requirements.txt
      - name: Run simulator schema tests
        run: python -m pytest -q tests

  thingsboard-init-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/thingsboard_init/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/thingsboard_init/requirements.txt
      - name: Run initializer tests
        run: python -m pytest -q tools/thingsboard_init/tests
      - name: Validate dry-run output
        run: python tools/thingsboard_init/init.py

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose -f compose.yaml config
