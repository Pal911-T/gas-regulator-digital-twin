name: Deploy V3.3 Showcase

on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject V3.4 twin analysis module
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('showcase/index.html')
          html = path.read_text(encoding='utf-8')
          css = '<link rel="stylesheet" href="upgrade-v34.css">'
          js = '<script src="upgrade-v34.js"></script>'
          if css not in html:
              html = html.replace('</head>', f'{css}\n</head>')
          if js not in html:
              html = html.replace('</body>', f'{js}\n</body>')
          path.write_text(html, encoding='utf-8')
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
