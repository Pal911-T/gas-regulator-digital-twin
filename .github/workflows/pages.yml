name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject platform upgrade modules
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('showcase/index.html')
          html = path.read_text(encoding='utf-8')
          assets = [
              ('</head>', '<link rel="stylesheet" href="upgrade-v34.css">'),
              ('</head>', '<link rel="stylesheet" href="upgrade-v35.css">'),
              ('</head>', '<link rel="stylesheet" href="upgrade-v36.css">'),
              ('</body>', '<script src="upgrade-v34.js"></script>'),
              ('</body>', '<script src="upgrade-v35.js"></script>'),
              ('</body>', '<script src="upgrade-v36.js"></script>'),
          ]
          for closing, asset in assets:
              if asset not in html:
                  html = html.replace(closing, f'{asset}\n{closing}')

          css = r'''
          .v35-orbit,.v35-eye,.v35-scanner,.v35-float-icon,.v35-floating-symbol{display:none!important}
          #v39RtWaveCard,#v39PressureBoard{margin-bottom:14px}
          .v39-wave-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px}
          .v39-wave-box,.v39-structure,.v39-control,.v39-metric,.v39-analysis,.v39-forecast{background:rgba(7,26,48,.86);border:1px solid rgba(0,229,255,.12);border-radius:12px}
          .v39-wave-box{padding:12px}.v39-wave-title{font-size:14px;color:var(--text-secondary);margin-bottom:8px}.v39-wave-canvas{height:150px}
          .v39-board-top{display:grid;grid-template-columns:1.25fr .9fr;gap:14px;padding:14px}
          .v39-structure{padding:12px}.v39-structure-title{display:flex;justify-content:space-between;align-items:center;color:#dff8ff;font-size:15px;margin-bottom:10px}
          .v39-structure-title small{color:var(--text-muted);font-size:12px}
          .v39-cutaway{position:relative;height:390px;overflow:hidden;border-radius:10px;background:linear-gradient(180deg,#06182b,#020b16);border:1px solid rgba(0,229,255,.1)}
          .v39-body{position:absolute;left:8%;right:8%;top:26%;height:48%;background:linear-gradient(180deg,#dce6ee,#8fa4b5 45%,#324758);clip-path:polygon(0 22%,34% 22%,42% 5%,58% 5%,66% 22%,100% 22%,100% 78%,66% 78%,58% 95%,42% 95%,34% 78%,0 78%)}
          .v39-channel{position:absolute;left:11%;right:11%;top:43%;height:18%;background:linear-gradient(90deg,#ff3158,#ff7a1c 38%,#ffc107 55%,#4fc3f7 100%);border-radius:4px;opacity:.88}
          .v39-throat{position:absolute;left:52%;top:38%;width:11%;height:28%;background:linear-gradient(90deg,#ff9f2d,#ff6d00);clip-path:polygon(0 14%,55% 14%,100% 50%,55% 86%,0 86%,22% 50%);filter:drop-shadow(0 0 10px rgba(255,130,0,.35))}
          .v39-core{position:absolute;left:60%;top:40%;width:12%;height:24%;background:linear-gradient(180deg,#eef4f8,#a7b8c5);clip-path:polygon(0 50%,24% 18%,100% 18%,100% 82%,24% 82%)}
          .v39-actuator{position:absolute;left:43%;top:9%;width:16%;height:33%;background:linear-gradient(180deg,#dfe7ed,#8196a7 55%,#344959);clip-path:polygon(10% 0,90% 0,90% 36%,100% 48%,100% 100%,0 100%,0 48%,10% 36%)}
          .v39-particle{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:#e7fdff;box-shadow:0 0 11px rgba(0,229,255,.9);animation:v39flow 4.8s linear infinite}.v39-particle.d2{animation-delay:1.2s}.v39-particle.d3{animation-delay:2.4s}.v39-particle.d4{animation-delay:3.5s}
          .v39-label{position:absolute;color:#9fd2e2;font-size:13px}.v39-label.a{left:12%;top:18%}.v39-label.b{left:43%;top:4%}.v39-label.c{right:11%;top:18%}.v39-label.d{left:48%;bottom:14%;color:#ffbd75}
          .v39-tag{position:absolute;background:rgba(3,17,31,.88);border:1px solid rgba(0,229,255,.16);border-radius:9px;padding:8px 10px;min-width:140px}.v39-tag small{display:block;color:#83b8ca;font-size:11px}.v39-tag strong{display:block;color:#00e5ff;font-family:'Share Tech Mono',monospace;font-size:20px;margin-top:4px}.v39-tag.p1{left:14px;bottom:14px}.v39-tag.pm{left:41%;bottom:4px}.v39-tag.p2{right:14px;bottom:14px}
          .v39-structure-note{font-size:12px;color:#8fbaca;line-height:1.65;margin-top:8px}
          .v39-right{display:grid;grid-template-rows:auto auto;gap:12px}.v39-control{padding:14px}.v39-control h4{margin:0 0 10px;color:#dff8ff}.v39-slider+.v39-slider{margin-top:10px}.v39-slider-top{display:flex;justify-content:space-between;color:#9bc7d7;font-size:13px;margin-bottom:5px}.v39-slider input{width:100%}
          .v39-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.v39-metric{padding:12px}.v39-metric span{display:block;color:#86b8ca;font-size:12px}.v39-metric strong{display:block;color:#00e5ff;font-family:'Share Tech Mono',monospace;font-size:25px;margin-top:7px}
          .v39-lower{display:grid;grid-template-columns:1.55fr .9fr;gap:14px;padding:0 14px 14px}.v39-forecast{padding:0}.v39-inner-head{padding:13px 14px 0}.v39-chart{height:340px;padding:6px 14px 14px}.v39-analysis-col{display:grid;gap:10px}.v39-analysis{padding:13px}.v39-analysis h4{margin:0 0 7px;color:#dff8ff;font-size:14px}.v39-analysis p{margin:0;color:#9cc6d5;line-height:1.7;font-size:12.5px}
          @keyframes v39flow{0%{left:14%;opacity:0}10%{opacity:1}55%{left:55%;transform:scale(1.05)}72%{left:65%;transform:scale(1.2)}100%{left:88%;opacity:0;transform:scale(.9)}}
          @media(max-width:1400px){.v39-board-top,.v39-lower,.v39-wave-grid{grid-template-columns:1fr}.v39-metrics{grid-template-columns:repeat(2,1fr)}}
          '''
          js = r'''
          (()=>{
            const q=(s,r=document)=>r.querySelector(s),qa=(s,r=document)=>[...r.querySelectorAll(s)];
            const fmt=(v,n=1)=>Number(v).toFixed(n),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
            const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
            const rt={dev:null,b:{valve:[],flow:[],temp:[]},c:{}};let fc=null;
            const push=(a,v)=>{a.push(+v);if(a.length>60)a.shift()};
            function mk(id,label,color,min,max){const el=document.getElementById(id);if(!el||!window.Chart)return null;return new Chart(el,{type:'line',data:{labels:[],datasets:[{label,data:[],borderColor:color,backgroundColor:color+'18',fill:true,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#4a7a9a',maxTicksLimit:8}},y:{min,max,grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#4a7a9a'}}},elements:{point:{radius:0},line:{tension:.32}}}})}
            function addRt(){const main=q('#tab-realtime .main'),first=main?.querySelector('.card');if(!main||!first||q('#v39RtWaveCard'))return;const card=document.createElement('div');card.id='v39RtWaveCard';card.className='card';card.innerHTML='<div class="card-head"><div class="card-title">关键直采指标波形监测</div><div style="font-size:14px;color:var(--text-muted)" id="v39RtDev">当前设备 · 60秒滚动窗口</div></div><div class="v39-wave-grid"><div class="v39-wave-box"><div class="v39-wave-title">阀门开度 X</div><div class="v39-wave-canvas"><canvas id="v39Valve"></canvas></div></div><div class="v39-wave-box"><div class="v39-wave-title">瞬时流量 Q</div><div class="v39-wave-canvas"><canvas id="v39Flow"></canvas></div></div><div class="v39-wave-box"><div class="v39-wave-title">气体温度 T</div><div class="v39-wave-canvas"><canvas id="v39Temp"></canvas></div></div></div>';first.after(card)}
            function addPressure(){const main=q('#tab-pressure .main');if(!main||q('#v39PressureBoard'))return;const sg=q('.scenario-grid',main);if(sg)sg.style.display='none';const sc=q('#scenarioChart')?.closest('.card');if(sc)sc.style.display='none';const mc=q('.mapping-chain',main)?.closest('.card');if(mc)mc.style.display='none';const board=document.createElement('div');board.id='v39PressureBoard';board.className='card';board.innerHTML='<div class="card-head"><div class="card-title">工况映射、诊断分析与短时预测</div><div style="font-size:14px;color:var(--text-muted)">历史10分钟分析 + 未来10分钟预测</div></div><div class="v39-board-top"><div class="v39-structure"><div class="v39-structure-title"><span>RTJ-25/4.0Z 核心结构与流动机理</span><small>结构—流动—状态耦合</small></div><div class="v39-cutaway"><div class="v39-body"></div><div class="v39-channel"></div><div class="v39-throat"></div><div class="v39-core"></div><div class="v39-actuator"></div><div class="v39-particle"></div><div class="v39-particle d2"></div><div class="v39-particle d3"></div><div class="v39-particle d4"></div><div class="v39-label a">高压进口腔</div><div class="v39-label b">执行与反馈机构</div><div class="v39-label c">低压出口腔</div><div class="v39-label d">阀芯—阀座节流与稳压恢复区</div><div class="v39-tag p1"><small>P1进口压力</small><strong id="v39P1">0.272 MPa</strong></div><div class="v39-tag pm"><small>Pm中间压力</small><strong id="v39Pm">0.091 MPa</strong></div><div class="v39-tag p2"><small>P2出口压力</small><strong id="v39P2">7.50 kPa</strong></div></div><div class="v39-structure-note">当前结构图为依据你提供的轴流式调压器剖面逻辑重绘的网页机理图。原始结构图片文件上传后，可直接替换为真实剖面底图并保留流动动画与状态标注。</div></div><div class="v39-right"><div class="v39-control"><h4>工况参数调节</h4><div class="v39-slider"><div class="v39-slider-top"><span>上游来压变化</span><b id="v39UpT">0%</b></div><input id="v39Up" type="range" min="-25" max="25" value="0"></div><div class="v39-slider"><div class="v39-slider-top"><span>下游负荷变化</span><b id="v39LoadT">0%</b></div><input id="v39Load" type="range" min="-30" max="30" value="0"></div><div class="v39-slider"><div class="v39-slider-top"><span>目标出口压力</span><b id="v39TargetT">7.5 kPa</b></div><input id="v39Target" type="range" min="4" max="10" step="0.1" value="7.5"></div><div class="v39-slider"><div class="v39-slider-top"><span>阀位响应延迟</span><b id="v39DelayT">80 ms</b></div><input id="v39Delay" type="range" min="0" max="300" step="10" value="80"></div></div><div class="v39-metrics"><div class="v39-metric"><span>一级阀建议调整</span><strong id="v39V1">+0%</strong></div><div class="v39-metric"><span>二级阀建议调整</span><strong id="v39V2">+0%</strong></div><div class="v39-metric"><span>预计恢复时间</span><strong id="v39Restore">2.4 min</strong></div><div class="v39-metric"><span>预测可信度</span><strong id="v39Conf">90%</strong></div><div class="v39-metric"><span>稳压精度</span><strong id="v39Acc">95%</strong></div><div class="v39-metric"><span>风险等级</span><strong id="v39Risk">低</strong></div></div></div></div><div class="v39-lower"><div class="v39-forecast"><div class="card-head v39-inner-head"><div class="card-title">实际压力与预测压力对比</div><div style="font-size:13px;color:var(--text-muted)">历史实测 / 自然响应预测 / 推荐调节预测</div></div><div class="v39-chart"><canvas id="v39Forecast"></canvas></div></div><div class="v39-analysis-col"><div class="v39-analysis"><h4>分析依据</h4><p id="v39Evidence">读取最近10分钟压力序列，计算平均值、标准差和趋势。</p></div><div class="v39-analysis"><h4>机理解释</h4><p id="v39Mechanism">一级阀承担粗调，二级阀承担精细稳压。</p></div><div class="v39-analysis"><h4>风险贡献</h4><p id="v39Break">风险由来压、负荷、延迟和波动性共同决定。</p></div><div class="v39-analysis"><h4>推荐处置</h4><p id="v39Action">当前工况可控，建议持续观察。</p></div></div></div>';const anchor=sg||main.children[3];anchor.parentNode.insertBefore(board,anchor);[['v39Up','sim_upstream'],['v39Load','sim_load'],['v39Target','sim_target'],['v39Delay','sim_delay']].forEach(([a,b])=>{const x=q('#'+a),y=q('#'+b);if(x&&y)x.value=y.value;x?.addEventListener('input',()=>{if(y)y.value=x.value;if(typeof updateScenarioModule==='function')updateScenarioModule();updatePressure()})})}
            function hist(){return(typeof d2_out!=='undefined'&&Array.isArray(d2_out)?d2_out.slice(-11):[7,7.1,7.2,7.1,7.0,7.15,7.25,7.18,7.1,7.2,7.12])}
            function calc(){const up=+q('#v39Up')?.value||0,load=+q('#v39Load')?.value||0,target=+q('#v39Target')?.value||7.5,delay=+q('#v39Delay')?.value||80;const actual=hist().map((v,i)=>+(v+up*.012-load*.015+Math.sin(i/2)*.04).toFixed(2)),cur=actual.at(-1),mean=actual.reduce((a,b)=>a+b,0)/actual.length,std=Math.sqrt(actual.reduce((a,b)=>a+(b-mean)**2,0)/actual.length),p1=.272*(1+up*.006),pm=clamp(.091+up*.0007-load*.0009,.05,.18),labels=[...Array.from({length:10},(_,i)=>`${10-i}min前`),'当前',...Array.from({length:10},(_,i)=>`${i+1}min`)];const nat=[],ctl=[],tau=2.2+delay/120,dist=-load*.034+up*.022;for(let i=0;i<=10;i++){const r=1-Math.exp(-i/tau);nat.push(+(cur+dist*r+Math.sin(i*.8)*.06).toFixed(2));ctl.push(+(cur+(target-cur)*r+dist*.22*r+Math.sin(i*.65)*.03).toFixed(2))}const v1=clamp(load/8-up/10+(target-7.5)*1.4,-12,14),v2=clamp(load/6-up/12+(target-cur)*2.2+delay/130,-14,16),restore=clamp(2.1+Math.abs(load)/12+Math.abs(up)/18+delay/180,1.8,8.5),res=clamp(1.2+Math.abs(up)*.05+Math.abs(load)*.06+delay*.009+std*3,1,8.5),conf=clamp(98-res*2.6,58,96),acc=clamp(100-Math.abs(cur-target)/target*350-std*3.2,70,99.4),score=Math.abs(up)*.28+Math.abs(load)*.42+delay*.03+std*18,risk=score<24?'低':score<40?'中':'高';return{up,load,target,delay,actual,cur,mean,std,p1,pm,p2:ctl.at(-1),labels,nat,ctl,v1,v2,restore,conf,acc,risk}}
            function chart(d){const nulls=Array(10).fill(null),actual=[...d.actual,...Array(10).fill(null)],nat=[...nulls,...d.nat],ctl=[...nulls,...d.ctl];if(!fc){const el=q('#v39Forecast');if(!el)return;fc=new Chart(el,{type:'line',data:{labels:d.labels,datasets:[{label:'历史实测P2',data:actual,borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,.06)',fill:true,borderWidth:2.2},{label:'自然响应预测',data:nat,borderColor:'#ffc107',borderDash:[8,5],borderWidth:2,spanGaps:true},{label:'推荐调节预测',data:ctl,borderColor:'#00e5ff',borderWidth:2.5,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{labels:{color:'#7eb8d8'}}},scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#4a7a9a',maxTicksLimit:8}},y:{min:0,max:14,grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#4a7a9a'}}},elements:{point:{radius:0},line:{tension:.35}}}})}else{fc.data.labels=d.labels;fc.data.datasets[0].data=actual;fc.data.datasets[1].data=nat;fc.data.datasets[2].data=ctl;fc.update('none')}}
            function updatePressure(){addPressure();const d=calc();set('v39UpT',(d.up>0?'+':'')+d.up+'%');set('v39LoadT',(d.load>0?'+':'')+d.load+'%');set('v39TargetT',fmt(d.target,1)+' kPa');set('v39DelayT',d.delay+' ms');set('v39P1',fmt(d.p1,3)+' MPa');set('v39Pm',fmt(d.pm,3)+' MPa');set('v39P2',fmt(d.p2,2)+' kPa');set('v39V1',(d.v1>=0?'+':'')+fmt(d.v1,1)+'%');set('v39V2',(d.v2>=0?'+':'')+fmt(d.v2,1)+'%');set('v39Restore',fmt(d.restore,1)+' min');set('v39Conf',fmt(d.conf,0)+'%');set('v39Acc',fmt(d.acc,1)+'%');set('v39Risk',d.risk);set('v39Evidence',`最近10分钟P2平均${fmt(d.mean,2)} kPa，标准差${fmt(d.std,2)} kPa，当前${fmt(d.cur,2)} kPa，目标${fmt(d.target,1)} kPa。`);set('v39Mechanism',`来压变化${d.up>=0?'+':''}${d.up}%影响一级有效压差，负荷变化${d.load>=0?'+':''}${d.load}%拉动流量需求；一级阀粗调、二级阀收敛出口偏差。`);set('v39Break',`来压贡献${fmt(Math.abs(d.up)*.28,1)}，负荷贡献${fmt(Math.abs(d.load)*.42,1)}，延迟贡献${fmt(d.delay*.03,1)}，波动性贡献${fmt(d.std*18,1)}。`);set('v39Action',d.risk==='低'?'当前工况可控，建议保持设定并持续观察Pm与P2联动。':d.risk==='中'?'建议优先修正一级阀响应，再用二级阀抑制出口偏差。':'建议立即降低扰动并复核执行机构及传感器状态。');chart(d)}
            function tick(){addRt();const key=q('#rtDevLabel')?.textContent||'';if(rt.dev!==key){rt.dev=key;Object.keys(rt.b).forEach(k=>rt.b[k]=[])}const valve=parseFloat(q('#rt_valve')?.textContent)||0,flow=parseFloat(q('#rt_flow')?.textContent)||0,temp=parseFloat(q('#rt_temp')?.textContent)||0;push(rt.b.valve,valve);push(rt.b.flow,flow);push(rt.b.temp,temp);set('v39RtDev',key+' · 直接采集量60秒波形');if(!rt.c.valve)rt.c.valve=mk('v39Valve','阀门开度','#00e5ff',0,100);if(!rt.c.flow)rt.c.flow=mk('v39Flow','瞬时流量','#4fc3f7',0,160);if(!rt.c.temp)rt.c.temp=mk('v39Temp','气体温度','#ffc107',0,30);const labels=Array.from({length:rt.b.valve.length},(_,i)=>`${rt.b.valve.length-i}s`);Object.keys(rt.c).forEach(k=>{const c=rt.c[k];c.data.labels=labels;c.data.datasets[0].data=rt.b[k];c.update('none')});updatePressure()}
            function boot(){addRt();addPressure();tick();setInterval(tick,1000)}document.readyState==='loading'?document.addEventListener('DOMContentLoaded',boot):boot();
          })();
          '''
          if 'id="v39-upgrade-style"' not in html:
              html = html.replace('</head>', f'<style id="v39-upgrade-style">{css}</style>\n</head>')
          if 'id="v39-upgrade-script"' not in html:
              html = html.replace('</body>', f'<script id="v39-upgrade-script">{js}</script>\n</body>')
          path.write_text(html, encoding='utf-8')
          PY
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
